name: Generate contribution arcade

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contribution-arcade
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate Galaga contribution graphs
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          games: galaga

      - name: Publish generated SVGs
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
