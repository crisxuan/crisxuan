name: Generate 3D contribution map

on:
  push:
    branches:
      - main
    paths-ignore:
      - "profile-3d-contrib/**"
  schedule:
    - cron: "41 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-contrib
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated images
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add profile-3d-contrib
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update 3D contribution map"
          git push
