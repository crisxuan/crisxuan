<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cxuanAI profile banner</title>
  <desc id="desc">A modern profile banner for cxuanAI, focused on AI tools, automation workflows, content systems, and local-first products.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="44" y1="48" x2="1220" y2="314" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.54" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#94a3b8" stroke-opacity="0.12"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="28" fill="url(#grid)"/>
  <path d="M46 298C194 220 286 310 420 230C554 150 632 188 760 118C888 48 1030 48 1218 94" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  <path d="M52 314C210 250 320 320 468 260C616 200 682 230 826 164C970 98 1072 116 1228 152" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>

  <g filter="url(#shadow)">
    <rect x="50" y="54" width="624" height="252" rx="24" fill="#020617" fill-opacity="0.62" stroke="#67e8f9" stroke-opacity="0.26"/>
    <rect x="74" y="78" width="76" height="8" rx="4" fill="#22d3ee"/>
    <text x="74" y="152" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800">cxuanAI</text>
    <text x="78" y="190" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">AI-native builder · Automation designer</text>
    <text x="78" y="218" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500">Content systems explorer · Local-first products</text>

    <g transform="translate(78 244)">
      <rect width="156" height="34" rx="17" fill="#0f766e" fill-opacity="0.95"/>
      <text x="18" y="23" fill="#ecfeff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">PRODUCT ENGINEER</text>
    </g>
    <g transform="translate(250 244)">
      <rect width="110" height="34" rx="17" fill="#0891b2" fill-opacity="0.95"/>
      <text x="18" y="23" fill="#ecfeff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">AI AGENTS</text>
    </g>
    <g transform="translate(376 244)">
      <rect width="132" height="34" rx="17" fill="#7c3aed" fill-opacity="0.95"/>
      <text x="18" y="23" fill="#faf5ff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">LOCAL-FIRST</text>
    </g>
