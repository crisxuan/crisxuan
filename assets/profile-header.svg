    <rect x="746" y="60" width="474" height="246" rx="24" fill="#020617" fill-opacity="0.54" stroke="#a7f3d0" stroke-opacity="0.22"/>
    <text x="780" y="98" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="600">workflow.map</text>

    <g transform="translate(782 124)">
