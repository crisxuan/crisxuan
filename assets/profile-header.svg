    </g>
    <g transform="translate(1018 216)">
      <rect width="160" height="48" rx="16" fill="#111827" stroke="#f59e0b" stroke-opacity="0.42"/>
      <text x="18" y="30" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Reduce repeat</text>
    </g>

    <path d="M948 148H1006" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
    <path d="M1098 178V204" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
    <path d="M1012 240H948" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
    <path d="M862 210V184" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" opacity="0.38"/>

    <circle cx="978" cy="148" r="5" fill="#22d3ee"/>
    <circle cx="1098" cy="191" r="5" fill="#34d399"/>
    <circle cx="978" cy="240" r="5" fill="#a78bfa"/>
    <circle cx="862" cy="197" r="5" fill="#f59e0b"/>
    <text x="782" y="292" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="500">Open-source discovery · Content pipelines · Personal data workbench</text>
